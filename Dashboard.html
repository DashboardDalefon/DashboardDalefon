              </main>

              {showLogin && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in duration-200">
                  <div className="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl relative animate-in zoom-in-95 duration-200">
                    <button onClick={() => { setShowLogin(false); setSelectedArea(null); setErrorMsg(''); }} className="absolute top-4 right-4 text-gray-400 hover:text-gray-800 transition-colors"><X size={24} /></button>
                    <div className="text-center mb-8">
                      <h3 className="text-2xl font-bold text-[#380e51] mb-2">{selectedArea === 'admin' ? 'Portal de Coordinadores' : `Ingreso a ${selectedArea === 'llamadas' ? 'Llamadas' : 'Chats'}`}</h3>
                      <p className="text-gray-500 text-sm">{selectedArea === 'admin' ? 'Acceso exclusivo para el equipo de gestión.' : 'Por favor ingresa tus credenciales de ejecutivo.'}</p>
                    </div>
                    <form onSubmit={handleLogin} className="flex flex-col gap-5">
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><User size={20} className="text-gray-400" /></div>
                        <input type="text" required value={email} onChange={(e) => setEmail(e.target.value)} placeholder={selectedArea === 'admin' ? "Usuario Admin" : "User ID / Correo Electrónico"} className="w-full pl-12 pr-4 py-3 bg-gray-50 text-gray-800 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#00e5ff] focus:border-transparent transition-all" />
                      </div>
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><KeyRound size={20} className="text-gray-400" /></div>
                        <input type="password" required value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Contraseña" className="w-full pl-12 pr-4 py-3 bg-gray-50 text-gray-800 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#ff00ff] focus:border-transparent transition-all" />
                      </div>
                      {errorMsg && <div className="text-red-500 text-sm font-semibold text-center bg-red-50 py-2 rounded-lg">{errorMsg}</div>}
                      <button type="submit" className="mt-4 w-full bg-[#380e51] hover:bg-[#2b0a3d] text-white font-bold py-3.5 rounded-xl transition-colors shadow-md">Entrar al Dashboard</button>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
